<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscador de Mantenimientos</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; padding: 20px; }
    .search-box { background: white; padding: 25px; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    input, button { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button { background: #1a73e8; color: white; cursor: pointer; border: none; }
    #resultadoBox, #loginBox { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; }
  </style>
</head>
<body>
  <div class="search-box">
    <h3>Buscador de Mantenimientos</h3>
    <input type="text" id="codigoInput" placeholder="Introduce el código...">
    <button onclick="buscar(true)">Buscar Registro</button>
    <div id="resultadoBox"></div>
    
    <button id="btnInfo" style="display:none; background:#34a853;" onclick="document.getElementById('loginBox').style.display='block'">Ver Más Información</button>
    
    <div id="loginBox">
      <input type="text" id="user" placeholder="Usuario">
      <input type="password" id="pass" placeholder="Contraseña">
      <button onclick="buscar(false)">Validar Acceso</button>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzL0vWwIODt0JRyZIdqBFAmXR50w8AVztY8dn2negkQotHog-IyKpITm5ophOGduOwQkg/exec";

    function buscar(esPublico) {
      const codigo = document.getElementById("codigoInput").value;
      const box = document.getElementById("resultadoBox");
      const url = esPublico ? `${WEB_APP_URL}?accion=buscar&codigo=${codigo}` : 
                              `${WEB_APP_URL}?accion=info&codigo=${codigo}&user=${document.getElementById('user').value}&pass=${document.getElementById('pass').value}`;

      fetch(url)
        .then(res => res.json())
        .then(data => {
          if (esPublico && data.encontrado) {
            box.style.display = "block";
            box.innerHTML = `<p>Cliente: ${data.cliente}</p><p>Equipo: ${data.equipo_intervenido}</p>`;
            document.getElementById("btnInfo").style.display = "block";
          } else if (!esPublico && data.encontrado) {
            alert(data.info_privada);
          } else {
            alert(data.error || "No encontrado");
          }
        });
    }
  </script>
</body>
</html>
