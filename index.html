<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Consulta Certificados SELECOBA
</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:'Segoe UI',Arial,sans-serif;

background:#f1f5f9;

display:flex;

justify-content:center;

padding:30px;

}



.container{

width:100%;

max-width:420px;

}



.logo{

text-align:center;

margin-bottom:20px;

}


.logo img{

width:180px;

}



.card{

background:white;

padding:25px;

border-radius:18px;

box-shadow:0 10px 30px rgba(0,0,0,.12);

}



h2{

text-align:center;

color:#1e293b;

}



input,button{

width:100%;

padding:13px;

margin-top:12px;

border-radius:10px;

border:1px solid #ddd;

font-size:16px;

}



button{

cursor:pointer;

border:none;

}



.buscar{

background:#0057b8;

color:white;

}



.info{

background:#16a34a;

color:white;

display:none;

}



.spinner{

display:none;

text-align:center;

margin-top:15px;

}



#resultado{

display:none;

margin-top:20px;

padding:20px;

border-radius:15px;

}



.ok{

background:#dcfce7;

border:2px solid #22c55e;

}



.error{

background:#fee2e2;

border:2px solid #ef4444;

}



.login{

display:none;

margin-top:20px;

}


</style>


</head>


<body>



<div class="container">


<div class="logo">

<img src="logo.png">

</div>



<div class="card">


<h2>
Consulta de Mantenimiento
</h2>



<input
id="codigo"
placeholder="Ingrese código del certificado">



<button
class="buscar"
onclick="buscar()">

Buscar

</button>




<div
class="spinner"
id="spinner">

🔄 Consultando certificado...

</div>




<div
id="resultado">

</div>




<button
id="btnInfo"
class="info"
onclick="mostrarLogin()">

Ver información técnica

</button>





<div
class="login"
id="login">


<input
id="usuario"
placeholder="Usuario">


<input
id="password"
type="password"
placeholder="Contraseña">


<button
class="buscar"
onclick="login()">

Ingresar

</button>


</div>


</div>


</div>





<script>


// NUEVA API CLOUDFLARE

const API =
"https://selecoba-api.info-selecoba.workers.dev";





// ENTER PARA BUSCAR

document
.getElementById("codigo")
.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){

buscar();

}

});






async function buscar(){



const codigo =
document
.getElementById("codigo")
.value
.trim();



if(!codigo){

return;

}




const spinner =
document.getElementById("spinner");


spinner.style.display="block";



const resultado =
document.getElementById("resultado");


resultado.style.display="none";



try{



const respuesta =
await fetch(

API+
"?codigo="+
encodeURIComponent(codigo)

);



const data =
await respuesta.json();



mostrarResultado(data);



}

catch(error){



resultado.style.display="block";


resultado.className="error";


resultado.innerHTML=
"❌ Error de conexión con el servidor";



}



finally{


spinner.style.display="none";


}



}








function mostrarResultado(data){



const box =
document
.getElementById("resultado");



box.style.display="block";



if(data.encontrado){



box.className="ok";



box.innerHTML=

`

<h3>
✔ Certificado encontrado
</h3>


<b>Cliente:</b><br>
${data.cliente}<br><br>


<b>Equipo:</b><br>
${data.equipo}<br><br>


<b>Fecha mantenimiento:</b><br>
${data.fecha}<br><br>


<b>Próximo mantenimiento:</b><br>
${data.proximo}

`;



document
.getElementById("btnInfo")
.style.display="block";



}

else{


box.className="error";


box.innerHTML=

`
❌ Certificado no encontrado
`;



document
.getElementById("btnInfo")
.style.display="none";


}



}








function mostrarLogin(){


document
.getElementById("login")
.style.display="block";


}







async function login(){



const codigo =
document
.getElementById("codigo")
.value;



const usuario =
document
.getElementById("usuario")
.value;



const password =
document
.getElementById("password")
.value;




try{


const respuesta =
await fetch(

API+
"?accion=info"+
"&codigo="+encodeURIComponent(codigo)+
"&user="+encodeURIComponent(usuario)+
"&pass="+encodeURIComponent(password)

);



const data =
await respuesta.json();




if(data.encontrado){


alert(
data.observaciones
);


}

else{


alert(
data.mensaje
);


}



}

catch(error){


alert(
"Error de conexión"
);


}



}



</script>


</body>

</html>
