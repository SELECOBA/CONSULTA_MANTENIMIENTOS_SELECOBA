<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
SELECOBA - Sistema de Gestión
</title>



<style>


*{

box-sizing:border-box;

}



body{


margin:0;

min-height:100vh;

font-family:'Segoe UI',Arial,sans-serif;

background:#f1f5f9;

display:flex;

justify-content:center;

align-items:center;

padding:25px;


}




.container{


width:100%;

max-width:420px;


}





.logo{


text-align:center;

margin-bottom:15px;


}



.logo img{


width:180px;


}



h1{


text-align:center;

font-size:26px;

color:#1e293b;

margin:10px 0;


}



.subtitulo{


text-align:center;

color:#64748b;

font-size:18px;

margin-bottom:30px;


}




.card{


background:white;

border-radius:20px;

padding:25px;

box-shadow:

0 10px 30px rgba(0,0,0,.12);


}





.opcion{


display:flex;

align-items:center;

gap:18px;

padding:20px;

margin-bottom:20px;

border-radius:15px;

text-decoration:none;

color:#1e293b;

background:#f8fafc;

border:1px solid #e2e8f0;

transition:.2s;


}



.opcion:hover{


transform:translateY(-3px);

box-shadow:

0 5px 15px rgba(0,0,0,.10);


}





.icono{


font-size:40px;


}





.titulo{


font-size:20px;

font-weight:bold;

}



.descripcion{


font-size:14px;

color:#64748b;

margin-top:5px;

}







.consultar{


border-left:6px solid #0057b8;


}




.registrar{


border-left:6px solid #16a34a;


}





.version{


text-align:center;

margin-top:25px;

font-size:13px;

color:#64748b;


}




</style>


</head>



<body>


<div class="container">



<div class="logo">

<img src="logo.png">

</div>




<h1>

SELECOBA

</h1>



<div class="subtitulo">

Sistema de Gestión de<br>

Mantenimientos

</div>




<div class="card">



<a 
class="opcion consultar"

href="consulta/consulta.html">


<div class="icono">

🔍

</div>


<div>


<div class="titulo">

CONSULTAR

</div>


<div class="descripcion">

Consultar Mantenimientos

</div>


</div>


</a>





<a

class="opcion registrar"

href="registro/registro.html">


<div class="icono">

📝

</div>


<div>


<div class="titulo">

REGISTRAR

</div>


<div class="descripcion">

Registrar mantenimiento

</div>


</div>


</a>






</div>




<div class="version">

Versión 1.0

</div>



</div>



</body>


</html>
