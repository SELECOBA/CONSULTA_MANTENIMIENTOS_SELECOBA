<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Certificados</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f2f2f2;
}

.contenedor{
    width:420px;
    margin:60px auto;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    cursor:pointer;
    border:none;
    color:#fff;
    border-radius:5px;
}

.buscar{
    background:#1976d2;
}

.info{
    background:#2e7d32;
    display:none;
}

#resultado{
    display:none;
    margin-top:20px;
    padding:15px;
    background:#eeeeee;
    border-radius:5px;
}

#login{
    display:none;
    margin-top:20px;
}
</style>

</head>

<body>

<div class="contenedor">

<h2>Consulta de Certificados</h2>

<input
id="codigo"
placeholder="Ingrese código">

<button
class="buscar"
onclick="buscar(true)">
Buscar
</button>

<div id="resultado"></div>

<button
id="btnInfo"
class="info"
onclick="mostrarLogin()">
Más información
</button>

<div id="login">

<input
id="user"
placeholder="Usuario">

<input
id="pass"
type="password"
placeholder="Contraseña">

<button
class="buscar"
onclick="buscar(false)">
Ingresar
</button>

</div>

</div>

<script>

const WEB_APP="https://script.google.com/macros/s/AKfycbzL0vWwIODt0JRyZIdqBFAmXR50w8AVztY8dn2negkQotHog-IyKpITm5ophOGduOwQkg/exec";

function mostrarLogin(){

document.getElementById("login").style.display="block";

}

async function buscar(publico){

const codigo=document.getElementById("codigo").value.trim();

if(codigo==""){

alert("Ingrese un código");

return;

}

let url=WEB_APP+
"?accion="+(publico?"buscar":"info")+
"&codigo="+encodeURIComponent(codigo);

if(!publico){

url+="&user="+encodeURIComponent(document.getElementById("user").value);
url+="&pass="+encodeURIComponent(document.getElementById("pass").value);

}

console.log("Consultando:");
console.log(url);

try{

const response=await fetch(url,{
method:"GET",
redirect:"follow"
});

console.log(response);

const texto=await response.text();

console.log(texto);

const data=JSON.parse(texto);

if(publico){

if(data.encontrado){

document.getElementById("resultado").style.display="block";

document.getElementById("resultado").innerHTML=
"<b>Cliente:</b> "+data.cliente+"<br>"+
"<b>Equipo:</b> "+data.equipo_intervenido+"<br>"+
"<b>Fecha:</b> "+data.fecha_mnto+"<br>"+
"<b>Próximo:</b> "+data.fecha_p_mnto;

document.getElementById("btnInfo").style.display="block";

}else{

alert(data.error);

}

}else{

if(data.encontrado){

alert(data.info_privada);

}else{

alert(data.error);

}

}

}catch(error){

console.error(error);

alert(error);

}

}

</script>

</body>
</html>
