<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Buscador de Mantenimientos</title>
  <style>
    body { font-family: sans-serif; margin: 40px; background: #f4f6f9; }
    .search-box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    input, button { width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; }
    .resultado { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; background: #e8f0fe; }
    .error { background: #fce8e6; color: #d93025; }
  </style>
</head>
<body>
  <div class="search-box">
    <h3>Consulta tu Mantenimiento</h3>
    <input type="text" id="codigoInput" placeholder="Introduce el código...">
    <button id="btnBuscar" onclick="realizarBusqueda()">Buscar Registro</button>
    <div id="resultadoBox" class="resultado"></div>
  </div>

  <script>
    const WEB_APP_URL = "TU_NUEVA_URL_AQUÍ"; 

    function realizarBusqueda() {
      const codigo = document.getElementById("codigoInput").value;
      const box = document.getElementById("resultadoBox");
      const btn = document.getElementById("btnBuscar");

      if (!codigo) return alert("Escribe un código");

      box.style.display = "block";
      box.innerHTML = "Consultando...";
      btn.disabled = true;

      fetch(WEB_APP_URL, {
        method: "POST",
        mode: "cors", // Importante: mantén cors
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ codigo: codigo })
      })
      .then(res => res.json())
      .then(data => {
        btn.disabled = false;
        if (data.encontrado) {
          box.classList.remove("error");
          box.innerHTML = `<strong>Resultado:</strong><br>Cliente: ${data.cliente}<br>Equipo: ${data.equipo_intervenido}<br>Próximo: ${data.fecha_p_mnto}`;
        } else {
          box.classList.add("error");
          box.innerHTML = "Código no encontrado.";
        }
      })
      .catch(err => {
        btn.disabled = false;
        box.classList.add("error");
        box.innerHTML = "Error de conexión. Revisa la consola.";
        console.error(err);
      });
    }
  </script>
</body>
</html>
