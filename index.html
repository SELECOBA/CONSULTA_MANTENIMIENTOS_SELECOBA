<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>
Consulta Certificados SELECOBA
</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:'Segoe UI',Arial;

background:#f1f5f9;

display:flex;

justify-content:center;

padding:30px;

}



.container{

width:100%;

max-width:420px;

}



.logo{

text-align:center;

margin-bottom:20px;

}



.logo img{

width:180px;

}



.card{

background:white;

padding:25px;

border-radius:18px;

box-shadow:0 10px 30px rgba(0,0,0,.12);

}



h2{

text-align:center;

color:#1e293b;

}



input,button{

width:100%;

padding:13px;

margin-top:12px;

border-radius:10px;

border:1px solid #ddd;

font-size:16px;

}



button{

cursor:pointer;

border:none;

}



.buscar{

background:#0057b8;

color:white;

}



.info{

background:#16a34a;

color:white;

display:none;

}



#resultado{

margin-top:20px;

display:none;

padding:20px;

border-radius:15px;

}



.ok{

background:#dcfce7;

border:2px solid #22c55e;

}



.error{

background:#fee2e2;

border:2px solid #ef4444;

}



.spinner{

display:none;

text-align:center;

margin-top:15px;

}



.login{

display:none;

margin-top:20px;

}



</style>

</head>


<body>


<div class="container">


<div class="logo">

<img src="logo.png">

</div>



<div class="card">


<h2>
Consulta de Mantenimiento
</h2>


<input 
id="codigo"
placeholder="Ingrese código">


<button 
class="buscar"
onclick="buscar()">

Buscar

</button>



<div class="spinner" id="spinner">

🔄 Consultando...

</div>



<div id="resultado"></div>



<button
id="btnInfo"
class="info"
onclick="mostrarLogin()">

Ver información técnica

</button>




<div class="login" id="login">


<input
id="usuario"
placeholder="Usuario">


<input
id="password"
type="password"
placeholder="Contraseña">


<button
class="buscar"
onclick="login()">

Ingresar

</button>


</div>


</div>

</div>




<script>


const API=

"https://script.google.com/macros/s/AKfycbyfgo2zeevdlX1Xq7RDz-ExT-FNMpfKDL2MPX11b6gGW3-0YMhaEPJZLOdwe7ccw1OBsQ/exec";





document
.getElementById("codigo")
.addEventListener("keypress",function(e){


if(e.key==="Enter"){

buscar();

}


});





function jsonp(url,callback){


const script=document.createElement("script");


script.src=url+"&callback="+callback;


document.body.appendChild(script);


script.remove();


}





function buscar(){


const codigo=
document.getElementById("codigo").value.trim();


if(!codigo)return;



document
.getElementById("spinner")
.style.display="block";




window.respuesta=function(data){


document
.getElementById("spinner")
.style.display="none";



const box=
document.getElementById("resultado");



box.style.display="block";



if(data.encontrado){


box.className="ok";


box.innerHTML=

`

<h3>✔ Certificado encontrado</h3>

<b>Cliente:</b> ${data.cliente}<br><br>

<b>Equipo:</b> ${data.equipo}<br><br>

<b>Fecha mantenimiento:</b> ${data.fecha}<br><br>

<b>Próximo mantenimiento:</b> ${data.proximo}

`;



document
.getElementById("btnInfo")
.style.display="block";



}else{


box.className="error";

box.innerHTML=

"❌ Certificado no encontrado";


}



};



jsonp(

API+
"?accion=buscar&codigo="
+encodeURIComponent(codigo)

,"respuesta");


}






function mostrarLogin(){

document
.getElementById("login")
.style.display="block";


}





function login(){


const codigo=
document.getElementById("codigo").value;



window.info=function(data){


if(data.encontrado){


alert(data.observaciones);


}else{


alert(data.mensaje);


}


};



jsonp(

API+
"?accion=info"+
"&codigo="+codigo+
"&user="+document.getElementById("usuario").value+
"&pass="+document.getElementById("password").value

,"info");


}


</script>


</body>

</html>
