<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>
Registro de Mantenimiento SELECOBA
</title>


<link rel="stylesheet" href="registro.css">


</head>


<body>


<div class="container">



<div class="logo">

<img src="../logo.png">

</div>




<div class="card">


<h2>

Registro de Mantenimiento

</h2>




<!-- LOGIN -->

<div id="loginBox">


<h3>
Acceso de usuario
</h3>



<input

id="usuario"

placeholder="Usuario"

>



<input

id="password"

type="password"

placeholder="Contraseña"

>




<button

class="btn azul"

onclick="iniciarSesion()"

>

Ingresar

</button>


</div>





<!-- USUARIO ACTIVO -->


<div

id="usuarioActivo"

class="usuarioActivo"

>

</div>







<!-- FORMULARIO -->


<div

id="formulario"

style="display:none;"



>



<input

id="cliente"

placeholder="Cliente"

>



<input

id="oc"

placeholder="Orden de compra"

type="number"

inputmode="numeric"

oninput="this.value=this.value.replace(/[^0-9]/g,'')"

>



<input

id="equipo"

placeholder="Equipo intervenido"

>



<select id="tipo">


<option value="">

Tipo de trabajo

</option>


<option>

Mnto. Preventivo

</option>


<option>

Mnto. Correctivo

</option>


<option>

Implementación

</option>


</select>

<textarea

id="observaciones"

placeholder="Observaciones"

></textarea>



<button

class="btn verde"

onclick="registrar()"

>

Guardar mantenimiento

</button>




<div

id="spinner"

class="spinner"

>

🔄 Guardando...

</div>



</div>




</div>




<a

href="../index.html"

class="volver"

>

← Volver al inicio

</a>




</div>




<script src="registro.js"></script>


</body>


</html>
