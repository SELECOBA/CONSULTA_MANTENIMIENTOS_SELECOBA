<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>
Consulta Mantenimientos SELECOBA
</title>
<link rel="stylesheet" href="consulta.css">
</head>
<body>
<div class="container">

    <!--==============================
        LOGO
    ==============================-->

    <div class="logo">
        <img src="../logo.png">
    </div>

    <!--==============================
        TARJETA
    ==============================-->

    <div class="card">
        <h2>
            Consulta de Mantenimiento
        </h2>

        <!--==============================
            BÚSQUEDA
        ==============================-->

        <input
            id="codigo"
            placeholder="Ingrese código del equipo"
            autocomplete="off"
        >
        <button
            id="btnBuscar"
            class="buscar"
            onclick="buscarCertificado()"
        >
            🔍 Buscar
        </button>
        <div
            id="spinner"
            class="spinner"
        >
            🔄 Consultando mantenimientoo...
        </div>
        <div
            id="resultado"
        >
        </div>

        <!--==============================
            INFORMACIÓN TÉCNICA
        ==============================-->

        <button
            id="btnInfo"
            class="info"
            onclick="mostrarLogin()"
        >
            🔐 Ver información técnica
        </button>

        <!--==============================
            LOGIN
        ==============================-->

        <div
            id="login"
            class="login"
        >

            <h3>
                Acceso técnico
            </h3>
            <input
                id="usuario"
                placeholder="Usuario"
                autocomplete="username"
            >
            <input
                id="password"
                type="password"
                placeholder="Contraseña"
                autocomplete="current-password"
            >
            <button
                id="btnLogin"
                class="buscar"
                onclick="validarAcceso()"
            >
                Ingresar
            </button>
            <div
                id="mensajeLogin"
                class="mensajeLogin"
            >
            </div>
        </div>

        <!--==============================
            PANEL INFORMACIÓN TÉCNICA
        ==============================-->

        <div
            id="informacionTecnica"
            class="informacionTecnica"
            style="display:none;"
        >
            <h3>
                Información Técnica
            </h3>
            <label>
                Historial del equipo
            </label>
            <textarea
                id="historial"
                readonly
            ></textarea>
            <button
                id="btnGarantia"
                class="garantia"
                onclick="abrirGarantia()"
            >
                🛠 Registrar garantía
            </button>
        </div>
    </div>
    <a
        href="../index.html"
        class="volver"
    >
        ← Volver al inicio
    </a>
</div>
<script src="consulta.js"></script>
</body>
</html>
